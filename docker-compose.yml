version: '3.8'

services:
  tarantool:
    image: tarantool/tarantool:3.2
    container_name: tarantool-kv
    ports:
      - "3301:3301"
    volumes:
      - ./tarantool/init.lua:/opt/tarantool/init.lua:ro
      - tarantool_data:/var/lib/tarantool
    command: tarantool /opt/tarantool/init.lua
    restart: unless-stopped
    # The healthcheck polls until the IPROTO port is accepting connections.
    # The Java service should be started only after this check passes.
    healthcheck:
      test: >
        tarantool -e "
          local ok = require('socket').tcp_connect('127.0.0.1', 3301)
          os.exit(ok and 0 or 1)
        "
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 5s

volumes:
  tarantool_data:
    driver: local
